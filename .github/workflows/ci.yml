name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_INCREMENTAL: "0"

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-wasip2
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Build Wasm extension
        run: cargo build --target wasm32-wasip2 --release

      - name: Clippy
        run: cargo clippy --target wasm32-wasip2 --release -- -D warnings

      - name: Unit tests
        run: cargo test
